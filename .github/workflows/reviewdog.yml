name: reviewdog
on:
  push:
    branches:
    - master
  pull_request:
jobs:
  shellcheck:
    name: runner / shellcheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: haya14busa/action-cond@94f77f7a80cd666cb3155084e428254fea4281fd # v1
      id: reporter
      with:
        cond: ${{ github.event_name == 'pull_request' }}
        if_true: "github-pr-review"
        if_false: "github-check"
    - uses: reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e # v1
      with:
        github_token: ${{ secrets.github_token }}
        reporter: ${{ steps.reporter.outputs.value }}
        level: warning

  hadolint:
    name: runner / hadolint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: haya14busa/action-cond@94f77f7a80cd666cb3155084e428254fea4281fd # v1
      id: reporter
      with:
        cond: ${{ github.event_name == 'pull_request' }}
        if_true: "github-pr-review"
        if_false: "github-check"
    - uses: reviewdog/action-hadolint@921946a7ebaaf08ac72607bad67209f4e52b5407 # v1
      with:
        github_token: ${{ secrets.github_token }}
        reporter: ${{ steps.reporter.outputs.value }}
        level: warning

  misspell:
    name: runner / misspell
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: reviewdog/action-misspell@d6429416b12b09b4e2768307d53bef58d172e962 # v1
      with:
        github_token: ${{ secrets.github_token }}
        reporter: github-check
        level: warning
        locale: "US"
